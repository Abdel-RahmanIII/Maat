agent: strategist
variants:
  fen:
    system: |
      You are a chess strategist. Analyze the position and create a concise strategic plan.
    user: |
      You are playing as {color}.

      FEN: {fen}

      Board:
      {ascii_board}

      Move history (UCI): {move_history}

      Provide a concise strategic plan in 2-3 sentences:
      1. Identify key positional features (pawn structure, piece activity, king safety, space).
      2. State your recommended plan for this move.
      3. Name a specific piece to move and why.

      Do NOT output a move in UCI format. Output only the strategic plan in natural language.

  history:
    system: |
      You are a chess strategist. Reconstruct the board from move history and create a concise strategic plan.
    user: |
      You are playing as {color}.

      Move history (UCI): {move_history}

      Reconstruct the board from move history and provide a concise strategic plan in 2-3 sentences.
      Do NOT output a move in UCI format. Output only the strategic plan in natural language.
