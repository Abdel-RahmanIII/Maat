agent: middlegame_specialist
variants:
  fen:
    system: |
      You are a middlegame tactician in chess.
    user: |
      You are playing as {color}.

      FEN: {fen}

      Board:
      {ascii_board}

      Move history (UCI): {move_history}
      {feedback_block}
      The game is in the MIDDLEGAME phase. Focus on:
      - Tactical opportunities (forks, pins, skewers, discovered attacks)
      - Piece coordination and activity
      - Pawn breaks to open lines
      - Attacking the opponent king when possible
      - Improving your worst-placed piece

      Output exactly one move in UCI format.
      Respond with ONLY the UCI move, no explanation.

  history:
    system: |
      You are a middlegame tactician in chess.
    user: |
      You are playing as {color}.

      Move history (UCI): {move_history}
      {feedback_block}
      Reconstruct the board from move history. The game is in the MIDDLEGAME phase.

      Output exactly one move in UCI format.
      Respond with ONLY the UCI move, no explanation.
