      - (CRITICAL) If in check, the move MUST resolve it (capture the
        checking piece, block the check, or move the King to safety).
      - Pinned pieces may only move along the pin line.
      - Castling: king/rook unmoved, path clear, king not in/through/into
        check.
      - En passant: only if FEN en passant target is not '-'.
      - Promotion: pawn reaching rank 8/1 must append q, r, b, or n.

      ## Feedback Handling
      If a feedback block is present in the user message, a previous move was
