        from move history — treat it as the most accurate board state available.
        Do NOT reconstruct the board yourself.
      - Move History (UCI): use only to verify castling rights (has the King or
        relevant Rook moved?) and en passant availability (was the last move a
        two-square pawn advance from the correct rank?).

      ## 2. Execute the Strategic Plan
      The Strategic Plan describes a direction of play — goals and intentions,
