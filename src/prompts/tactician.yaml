          If yes → ILLEGAL (Kings cannot be adjacent).
      □ CHECK RESOLUTION (CRITICAL): If the Observer's CHECK VERDICT reports
        your King is in check, this move MUST resolve it — capture the
        checker, block the line, or move the King to a safe square. Even
        if doing so deviates from the strategic plan.
      □ PIN COMPLIANCE: Cross-reference the Observer's ABSOLUTE PINS section.
        If the candidate piece is listed as absolutely pinned, the move must
