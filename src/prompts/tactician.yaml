      □ EN PASSANT (skip if not en passant): Only legal if the last move in
        history was a two-square pawn advance and the capturing pawn is on
        the correct rank and adjacent file.
      □ PROMOTION (skip if not applicable): Pawn reaching rank 8 (White)
